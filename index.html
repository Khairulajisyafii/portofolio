<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Khairul Aji Syafi'i — Portfolio</title>
    <meta
      name="description"
      content="Portfolio of Khairul Aji Syafi'i — Full-Stack Web Developer & DevOps Enthusiast based in Tangerang, Indonesia."
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="root.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />
  </head>

  <body>
    <section class="slide slide-home" id="home">
      <p class="home-nav-name">Khairul Aji Syafi'i</p>

      <div class="hero-text-stack">
        <span class="hero-line hero-line-1" aria-hidden="true"
          >KHAIRUL AJI SYAFI'I</span
        >
        <span class="hero-line hero-line-2" aria-hidden="true"
          >KHAIRUL AJI SYAFI'I</span
        >
        <span class="hero-line hero-line-3" aria-hidden="true"
          >KHAIRUL AJI SYAFI'I</span
        >
      </div>
      <div class="home-center">
        <div class="hero-person">
          <img
            src="assets/image/path.png"
            class="hero-cloud hero-cloud-1"
            alt=""
          />
          <img
            src="assets/image/me.png"
            class="hero-me"
            alt="Khairul Aji Syafi'i"
          />
        </div>

        <!-- Title + stats -->
        <div class="hero-info">
          <div class="hero-title-box">
            <h1>Web Developer &amp; Devops Enthusiast</h1>
          </div>
          <div class="hero-stats">
            <span class="hero-stat">18 years old</span>
            <span class="hero-stat">7 Tech stack</span>
            <span class="hero-stat">5+ Big Project</span>
          </div>
        </div>
      </div>
      <!-- CTA Buttons -->
      <div class="hero-cta">
        <a href="#about" class="btn-3d" id="btnGetStarted">
          <span class="btn-front">GET STARTED</span>
          <span class="btn-shadow"></span>
        </a>
        <a href="#" class="btn-3d" id="btnDownloadCV">
          <span class="btn-front">DOWNLOAD CV</span>
          <span class="btn-shadow"></span>
        </a>
      </div>

      <!-- Bottom orange mask -->
      <img src="assets/image/Mask-bg.png" class="home-mask" alt="" />
    </section>
  </body>
</html>
